<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encriptador — Discretas 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────── */
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #21262d;
      --border:     #30363d;
      --accent:     #58a6ff;
      --accent-dim: #1f3a5f;
      --green:      #3fb950;
      --green-dim:  #0d2818;
      --yellow:     #d29922;
      --yellow-dim: #2d2008;
      --red:        #f85149;
      --purple:     #d2a8ff;
      --purple-dim: #2d1f47;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }

    /* ── Reset & base ──────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      gap: 1.5rem;
    }

    /* grid of dots background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #30363d 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ────────────────────────────────── */
    .layout {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 740px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ── Card base ─────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    /* ── Header ────────────────────────────────── */
    header {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: var(--mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.5px;
    }
    header p {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    /* ── Form panel ────────────────────────────── */
    .panel-form { display: flex; flex-direction: column; gap: 1rem; }

    .field label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .4rem;
    }

    select, input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem .85rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
      appearance: none;
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,.12);
    }

    /* ── Key info box ──────────────────────────── */
    .key-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      min-height: 56px;
    }
    .key-box-info { min-width: 0; flex: 1; }
    .key-box-info small {
      font-size: .68rem;
      color: var(--muted);
      display: block;
      margin-bottom: .2rem;
    }
    .key-box-info span {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      font-size: .68rem;
      font-weight: 600;
      padding: .2rem .55rem;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-loading { background: var(--yellow-dim); color: var(--yellow); }
    .badge-ok      { background: var(--green-dim);  color: var(--green);  }
    .badge-error   { background: #2d0e0e;            color: var(--red);    }

    /* ── Buttons ───────────────────────────────── */
    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: .7rem 1rem;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
      filter: none;
    }
    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Result boxes ──────────────────────────── */
    .result-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .85rem 1rem;
      display: none;
    }
    .result-box.visible { display: block; }
    .result-box small {
      font-size: .68rem;
      color: var(--muted);
      display: block;
      margin-bottom: .4rem;
    }
    .result-box .value {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
    }
    .result-box.green { border-color: #1a4a1a; background: var(--green-dim); }
    .result-box.blue  { border-color: #1a3050; background: var(--accent-dim); }

    /* ── Error ─────────────────────────────────── */
    .error-msg {
      color: var(--red);
      font-size: .8rem;
      text-align: center;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Steps panel ───────────────────────────── */
    .panel-steps { display: flex; flex-direction: column; gap: 0; }

    .steps-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .steps-header h2 {
      font-family: var(--mono);
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
    }
    .tab-group {
      display: flex;
      gap: .4rem;
    }
    .tab {
      font-size: .72rem;
      font-weight: 600;
      padding: .3rem .75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* placeholder when no steps */
    .steps-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: .82rem;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
    .steps-placeholder svg { opacity: .3; }

    /* step list */
    .step-list { display: flex; flex-direction: column; gap: .75rem; }

    .step-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s, transform .3s;
    }
    .step-item.show {
      opacity: 1;
      transform: translateY(0);
    }

    .step-head {
      display: flex;
      align-items: flex-start;
      gap: .85rem;
      padding: .85rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: .7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: .1rem;
    }
    .step-title-group { flex: 1; min-width: 0; }
    .step-title {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .step-formula {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--accent);
      margin-top: .2rem;
      display: block;
    }
    .step-chevron {
      color: var(--muted);
      flex-shrink: 0;
      transition: transform .2s;
      margin-top: .2rem;
    }
    .step-item.open .step-chevron { transform: rotate(180deg); }

    .step-body {
      display: none;
      padding: 0 1rem .9rem 3.45rem;
      border-top: 1px solid var(--border);
      padding-top: .75rem;
    }
    .step-item.open .step-body { display: block; }

    .step-detail {
      font-size: .82rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: .6rem;
    }
    .step-detail p { margin-bottom: .65rem; }
    .step-detail p:last-child { margin-bottom: 0; }
    .step-detail b, .step-detail strong {
      color: var(--purple);
      font-weight: 700;
    }
    .step-detail .hl {
      color: var(--yellow);
      font-weight: 700;
    }
    .step-detail .hl-green {
      color: var(--green);
      font-weight: 700;
    }
    .step-detail code {
      font-family: var(--mono);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .05rem .35rem;
      color: var(--accent);
    }
    .step-values {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
    }
    .kv {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .25rem .6rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text);
    }
    .kv span { color: var(--muted); margin-right: .3rem; }

    /* char table for per-character steps */
    .char-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: .72rem;
      margin-top: .5rem;
    }
    .char-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      padding: .3rem .5rem;
      border-bottom: 1px solid var(--border);
    }
    .char-table td {
      padding: .35rem .5rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      word-break: break-all;
    }
    .char-table tr:last-child td { border-bottom: none; }
    .char-table .char-col {
      color: var(--accent);
      font-weight: 700;
    }

    /* loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    /* video embed (Teoría) */
    .video-embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: .5rem;
    }
    .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .video-caption {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .4rem;
    }

    /* interactive widgets */
    .interactive-box {
      background: var(--surface);
      border: 1px solid var(--purple);
      border-radius: 8px;
      padding: .9rem;
      margin-top: .75rem;
    }
    .interactive-box .interactive-label {
      font-size: .68rem;
      font-weight: 700;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .interactive-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
      margin-bottom: .6rem;
    }
    .interactive-row label {
      font-size: .7rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }
    .interactive-box input[type="number"],
    .interactive-box input[type="text"] {
      width: 90px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .4rem .5rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: .78rem;
    }
    .interactive-box input[type="text"].char-input { width: 50px; text-align: center; }
    .btn-interactive {
      background: var(--purple-dim);
      border: 1px solid var(--purple);
      color: var(--purple);
      border-radius: 6px;
      padding: .4rem .8rem;
      font-family: var(--sans);
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-interactive:hover { background: var(--purple); color: #000; }
    .interactive-result {
      margin-top: .6rem;
      font-size: .78rem;
    }
    .interactive-note {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .5rem;
      line-height: 1.5;
    }
    .reveal-step {
      display: inline-block;
      opacity: .35;
      transition: opacity .3s;
    }
    .reveal-step.revealed { opacity: 1; }

    /* ── Reloj modular (ElGamal) ───────────────── */
    .reloj-wrap { margin-top: .85rem; }
    .reloj-toggle-row {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
    }
    .reloj-svg-container {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-top: .6rem;
    }
    .reloj-svg-container.visible {
      display: block;
      animation: reloj-expand .25s ease-out;
    }
    @keyframes reloj-expand {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reloj-svg-container svg { display: block; margin: 0 auto; }
    .reloj-legend {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem 1rem;
      margin-top: .7rem;
      font-size: .7rem;
      color: var(--muted);
    }
    .reloj-legend .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: .3rem;
      vertical-align: middle;
    }
    .reloj-caption {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .6rem;
      line-height: 1.6;
    }
    .reloj-caption b { color: var(--purple); }
  </style>
</head>
<body>

  <header>
    <h1>// encriptador</h1>
    <p>Matemáticas Discretas 2 — RSA · ElGamal · AES-256-CBC</p>
  </header>

  <div class="layout">

    <!-- ── LEFT: form panel ──────────────────── -->
    <div class="card panel-form">

      <!-- Método -->
      <div class="field">
        <label>Método de cifrado</label>
        <select id="metodo" class="form-select">
          <option value="elgamal" selected>ElGamal </option>
          <option value="rsa">RSA </option>
          <option value="aes">AES-256 </option>
        </select>
      </div>

      <!-- Claves -->
      <div class="key-box">
        <div class="key-box-info">
          <small id="label-clave-publica">Clave pública</small>
          <span id="info-clave-publica">—</span>
        </div>
        <span id="estado-claves" class="badge badge-loading">Cargando…</span>
      </div>

      <button id="btn-generar-claves" class="btn btn-secondary" onclick="cargarClaves()">
        Generar nuevas claves
      </button>

      <!-- Contraseña -->
      <div class="field">
        <label>Texto a cifrar</label>
        <input id="password" type="text" placeholder="Ingresa tu contraseña…" autocomplete="off" />
      </div>

      <!-- Botón encriptar -->
      <button id="btn-encriptar" class="btn btn-primary" onclick="encriptar()">
        Encriptar
      </button>

      <!-- Resultado cifrado -->
      <div id="resultado" class="result-box green">
        <small>Texto cifrado:</small>
        <div id="resultado-texto" class="value"></div>
        <button class="btn btn-secondary" style="margin-top:.75rem" onclick="desencriptar()">
          Desencriptar
        </button>
      </div>

      <!-- Resultado descifrado -->
      <div id="resultado-descifrado-container" class="result-box blue">
        <small>Texto descifrado:</small>
        <div id="resultado-descifrado" class="value"></div>
      </div>

      <!-- Error -->
      <div id="error" class="error-msg"></div>

    </div><!-- /panel-form -->

    <!-- ── RIGHT: steps panel ────────────────── -->
    <div class="card panel-steps">

      <div class="steps-header">
        <h2>Paso a paso</h2>
        <div class="tab-group">
          <button class="tab active"        id="tab-teoria"   onclick="cambiarTab('teoria')">Teoría</button>
          <button class="tab" id="tab-claves"   onclick="cambiarTab('claves')">Claves</button>
          <button class="tab"        id="tab-cifrado"  onclick="cambiarTab('cifrado')">Cifrado</button>
          <button class="tab"        id="tab-descifrado" onclick="cambiarTab('descifrado')">Descifrado</button>
        </div>
      </div>

      <!-- Placeholder (se oculta cuando hay pasos) -->
      <div id="steps-placeholder" class="steps-placeholder">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5"
             viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
        </svg>
        <p>Los pasos aparecerán aquí<br/>después de generar las claves o cifrar.</p>
      </div>

      <!-- Step list container -->
      <div id="step-list" class="step-list"></div>

    </div><!-- /panel-steps -->

  </div><!-- /layout -->

  <script src="./js/script.js"></script>
</body>
</html>
