<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encriptador</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Encriptador de Contraseña</h1>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-600 mb-1">Contraseña</label>
      <input id="password" type="text" placeholder="Ingresa tu contraseña"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-600 mb-1">Llave</label>
      <input id="key" type="text" placeholder="Ingresa la llave"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <button onclick="encriptar()"
      class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">
      Encriptar
    </button>

    <div id="resultado" class="hidden mt-6 bg-green-50 border border-green-200 rounded-lg p-4">
      <p class="text-sm text-gray-500 mb-1">Contraseña encriptada:</p>
      <p id="resultado-texto" class="font-mono text-gray-800 break-all"></p>
    </div>

    <div id="error" class="hidden mt-4 text-red-500 text-sm text-center"></div>
  </div>

  <script src="./js/script.js"></script>

</body>
</html>
